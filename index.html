<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISP OS License Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #1e3a5f;
            margin-bottom: 8px;
            font-size: 24px;
        }
        .subtitle {
            color: #64748b;
            margin-bottom: 32px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
            font-size: 14px;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #3b82f6;
        }
        .hardware-id {
            font-family: monospace;
            font-size: 12px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
        }
        .result {
            margin-top: 24px;
            padding: 20px;
            background: #f0fdf4;
            border: 2px solid #22c55e;
            border-radius: 12px;
            display: none;
        }
        .result.show { display: block; }
        .result h3 {
            color: #166534;
            margin-bottom: 12px;
            font-size: 16px;
        }
        .code-box {
            background: #1e293b;
            color: #22c55e;
            padding: 16px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 11px;
            word-break: break-all;
            margin-bottom: 12px;
            position: relative;
        }
        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 6px 12px;
            font-size: 12px;
            background: #3b82f6;
            width: auto;
        }
        .info {
            font-size: 12px;
            color: #64748b;
            margin-top: 8px;
        }
        .history {
            margin-top: 32px;
            border-top: 1px solid #e2e8f0;
            padding-top: 24px;
        }
        .history h3 {
            color: #334155;
            margin-bottom: 16px;
            font-size: 16px;
        }
        .history-item {
            background: #f8fafc;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .history-item .customer { font-weight: 600; color: #1e3a5f; }
        .history-item .hwid { font-family: monospace; font-size: 11px; color: #64748b; }
        .history-item .date { font-size: 11px; color: #94a3b8; }
        .clear-btn {
            background: #ef4444;
            margin-top: 8px;
            padding: 8px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>ISP OS License Generator</h1>
            <p class="subtitle">Generate offline activation codes for customers</p>

            <div class="form-group">
                <label>Hardware ID</label>
                <input type="text" id="hardwareId" class="hardware-id" placeholder="Paste customer's Hardware ID here...">
            </div>

            <div class="form-group">
                <label>Customer Name</label>
                <input type="text" id="customer" placeholder="e.g., Juan's Internet Cafe">
            </div>

            <div class="form-group">
                <label>License Tier</label>
                <select id="tier">
                    <option value="enterprise">Enterprise (Full Features)</option>
                    <option value="pro">Pro</option>
                    <option value="basic">Basic</option>
                </select>
            </div>

            <button onclick="generateCode()">Generate Activation Code</button>

            <div class="result" id="result">
                <h3>Activation Code Generated!</h3>
                <div class="code-box">
                    <span id="generatedCode"></span>
                    <button class="copy-btn" onclick="copyCode()">Copy</button>
                </div>
                <p class="info">
                    <strong>Customer:</strong> <span id="resultCustomer"></span><br>
                    <strong>Tier:</strong> <span id="resultTier"></span><br>
                    <strong>Hardware:</strong> <span id="resultHwid"></span>
                </p>
            </div>

            <div class="history" id="historySection">
                <h3>Recent Licenses</h3>
                <div id="historyList"></div>
                <button class="clear-btn" onclick="clearHistory()">Clear History</button>
            </div>
        </div>
    </div>

    <script>
        // IMPORTANT: This must match the secret in licenseService.js
        const OFFLINE_SECRET = 'ac794b1ccc6e9664e01e7a973f007ad23f07c7f0fd3b60e0ba3f978af3f748d3';

        function generateCode() {
            const hardwareId = document.getElementById('hardwareId').value.trim();
            const customer = document.getElementById('customer').value.trim();
            const tier = document.getElementById('tier').value;

            if (!hardwareId) {
                alert('Please enter Hardware ID');
                return;
            }
            if (!customer) {
                alert('Please enter Customer Name');
                return;
            }

            // Create payload (same format as licenseService.js)
            const data = {
                h: hardwareId,
                c: customer,
                t: tier,
                ts: Date.now()
            };

            const payload = JSON.stringify(data);

            // Generate HMAC signature (first 16 chars)
            const signature = CryptoJS.HmacSHA256(payload, OFFLINE_SECRET)
                .toString(CryptoJS.enc.Hex)
                .substring(0, 16);

            // Create code: base64(payload).signature
            const payloadB64 = btoa(payload);
            const code = payloadB64 + '.' + signature;

            // Display result
            document.getElementById('generatedCode').textContent = code;
            document.getElementById('resultCustomer').textContent = customer;
            document.getElementById('resultTier').textContent = tier;
            document.getElementById('resultHwid').textContent = hardwareId.substring(0, 16) + '...';
            document.getElementById('result').classList.add('show');

            // Save to history
            saveToHistory({ customer, hardwareId, tier, code, date: new Date().toISOString() });
            loadHistory();
        }

        function copyCode() {
            const code = document.getElementById('generatedCode').textContent;
            navigator.clipboard.writeText(code).then(() => {
                alert('Code copied to clipboard!');
            });
        }

        function saveToHistory(item) {
            let history = JSON.parse(localStorage.getItem('licenseHistory') || '[]');
            history.unshift(item);
            history = history.slice(0, 50); // Keep last 50
            localStorage.setItem('licenseHistory', JSON.stringify(history));
        }

        function loadHistory() {
            const history = JSON.parse(localStorage.getItem('licenseHistory') || '[]');
            const list = document.getElementById('historyList');

            if (history.length === 0) {
                document.getElementById('historySection').style.display = 'none';
                return;
            }

            document.getElementById('historySection').style.display = 'block';
            list.innerHTML = history.slice(0, 10).map(item => `
                <div class="history-item">
                    <div class="customer">${item.customer}</div>
                    <div class="hwid">${item.hardwareId.substring(0, 24)}...</div>
                    <div class="date">${new Date(item.date).toLocaleString()} - ${item.tier}</div>
                </div>
            `).join('');
        }

        function clearHistory() {
            if (confirm('Clear all license history?')) {
                localStorage.removeItem('licenseHistory');
                loadHistory();
            }
        }

        // Load history on page load
        loadHistory();
    </script>
</body>
</html>
